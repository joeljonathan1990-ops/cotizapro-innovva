<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>CotizaPro · INNOVVA Industrials</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%230c0c0e'/%3E%3Crect x='22' y='22' width='56' height='56' fill='none' stroke='%23e8a25e' stroke-width='6'/%3E%3C/svg%3E">
<!-- App instalable (iPad / Android) -->
<meta name="theme-color" content="#0c0c0e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CotizaPro">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-180.png">
<style>
  :root{
    --bg:#0c0c0e; --panel:#15151a; --panel2:#1d1d23; --line:#2a2a32;
    --txt:#f2f2f4; --muted:#a5a5b2; --muted2:#6e6e7a;
    --accent:#e8a25e; --accent-d:#c9853f; --accent-soft:#2a2118;
    --green:#28c76f; --green-bg:#10301f;
    --amber:#3aa0ff; --amber-bg:#10243a;
    --red:#ff5b5b; --red-bg:#3a1414;
    --gray:#8a8a96; --gray-bg:#24242a;
    --field-bg:#ffffff; --field-txt:#111114; --field-line:#c9c9d2;
    --radius:12px;
    --shadow:0 6px 24px rgba(0,0,0,.45);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--txt);
    font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
    font-size:14px; line-height:1.45; -webkit-font-smoothing:antialiased;
  }
  a{color:var(--accent)}
  button{font-family:inherit}
  input,select,textarea{font-family:inherit}

  /* ===== layout ===== */
  .topbar{
    position:sticky; top:0; z-index:50;
    display:flex; align-items:center; gap:18px;
    padding:12px 20px; background:linear-gradient(180deg,#141417,#0e0e11);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:12px; cursor:pointer; user-select:none}
  .brand-logo{height:26px; width:auto; display:block}
  .brand-sub{color:var(--muted); font-size:11px; letter-spacing:2px; text-transform:uppercase; border-left:1px solid var(--line); padding-left:12px}
  .brand-sub b{color:var(--accent)}
  .topbar .spacer{flex:1}
  .proj-pill{
    display:flex; align-items:center; gap:10px; padding:7px 12px;
    background:var(--panel2); border:1px solid var(--line); border-radius:30px;
    font-size:13px; max-width:360px;
  }
  .proj-pill .code{color:var(--accent); font-weight:700; font-variant-numeric:tabular-nums}
  .proj-pill select{
    background:transparent;border:none;color:var(--txt);font-size:13px;outline:none;max-width:220px;
  }

  .shell{display:flex; min-height:calc(100vh - 59px)}
  .side{
    width:236px; flex-shrink:0; background:var(--panel); border-right:1px solid var(--line);
    padding:14px 10px; position:sticky; top:59px; height:calc(100vh - 59px); overflow-y:auto;
  }
  .side .grp{margin:6px 6px 4px; color:var(--muted2); font-size:10.5px; letter-spacing:1.5px; text-transform:uppercase}
  .navbtn{
    display:flex; align-items:center; gap:10px; width:100%; text-align:left;
    padding:9px 11px; margin:2px 0; border:none; background:transparent; color:var(--muted);
    border-radius:9px; cursor:pointer; font-size:13.5px; transition:.12s;
  }
  .navbtn .ic{width:20px; text-align:center; font-size:15px}
  .navbtn:hover{background:var(--panel2); color:var(--txt)}
  .navbtn.active{background:var(--accent-soft); color:var(--accent); font-weight:600}
  .navbtn .dot{margin-left:auto; width:8px;height:8px;border-radius:50%}
  .main{flex:1; padding:24px 28px 90px; max-width:1240px}

  /* ===== generic ===== */
  h1{font-size:21px; margin:0 0 3px}
  h2{font-size:16px; margin:0 0 14px; letter-spacing:.3px}
  .sub{color:var(--muted); font-size:13px; margin:0 0 22px}
  .card{background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:18px 20px; margin-bottom:18px}
  .card h3{margin:0 0 14px; font-size:14px; letter-spacing:.4px; display:flex; align-items:center; gap:8px}
  .row{display:flex; gap:14px; flex-wrap:wrap}
  .grid2{display:grid; grid-template-columns:1fr 1fr; gap:14px}
  .grid3{display:grid; grid-template-columns:1fr 1fr 1fr; gap:14px}
  .field label{display:block; color:var(--muted); font-size:11.5px; text-transform:uppercase; letter-spacing:.5px; margin-bottom:5px}
  .field{flex:1; min-width:150px; margin-bottom:12px}

  /* CAMPOS DE ESCRITURA: blanco con letra negra (legibilidad) */
  input[type=text],input[type=number],input[type=date],select,textarea{
    width:100%; padding:9px 11px; background:var(--field-bg); border:1.5px solid var(--field-line);
    color:var(--field-txt); border-radius:8px; font-size:14.5px; outline:none; transition:.12s;
    font-weight:500;
  }
  select option{background:#fff; color:#111}
  input:focus,select:focus,textarea:focus{border-color:var(--accent); box-shadow:0 0 0 3px rgba(232,162,94,.25)}
  textarea{resize:vertical; min-height:60px}
  input[type=number]{font-variant-numeric:tabular-nums}
  input.money{text-align:right; font-variant-numeric:tabular-nums; font-weight:600; letter-spacing:.2px}
  ::placeholder{color:#9a9aa6}

  .btn{
    display:inline-flex; align-items:center; gap:7px; padding:9px 15px; border-radius:9px;
    border:1px solid var(--line); background:var(--panel2); color:var(--txt); cursor:pointer;
    font-size:13px; font-weight:600; transition:.12s;
  }
  .btn:hover{border-color:var(--muted)}
  .btn.primary{background:var(--accent); color:#000; border-color:var(--accent)}
  .btn.primary:hover{background:var(--accent-d)}
  .btn.ghost{background:transparent}
  .btn.danger{color:var(--red); border-color:#4a1f1f}
  .btn.danger:hover{background:var(--red-bg)}
  .btn.sm{padding:6px 11px; font-size:12px}
  .btn:disabled{opacity:.4; cursor:not-allowed}

  /* ===== tables ===== */
  .tbl-tools{display:flex; align-items:center; gap:10px; margin-bottom:10px; flex-wrap:wrap}
  .tbl-tools input.search{max-width:280px; padding:7px 10px; font-size:13px}
  .tbl-tools .cnt-info{color:var(--muted); font-size:12px}
  .tbl-scroll{overflow-x:auto; max-height:560px; overflow-y:auto; border:1px solid var(--line); border-radius:8px}
  .mod-table{width:100%; border-collapse:separate; border-spacing:0; font-size:13.5px}
  .mod-table th{
    position:sticky; top:0; z-index:2; background:var(--panel2);
    text-align:left; color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase;
    letter-spacing:.5px; padding:9px 8px; border-bottom:1px solid var(--line); white-space:nowrap;
  }
  .mod-table td{padding:6px 8px; border-bottom:1px solid #1f1f25; vertical-align:middle; background:var(--panel)}
  .mod-table tbody tr:nth-child(even) td{background:#17171d}
  .mod-table tr:last-child td{border-bottom:none}
  .mod-table input,.mod-table select{padding:7px 9px; font-size:13.5px}
  .mod-table .num{text-align:right; font-variant-numeric:tabular-nums}
  .mod-table input.num{text-align:right}
  .mod-table .idx{color:var(--muted2); font-size:11.5px; text-align:right; width:30px; font-variant-numeric:tabular-nums}
  .cell-total{font-weight:800; color:var(--accent); text-align:right; font-variant-numeric:tabular-nums; white-space:nowrap; font-size:14px}
  .w-tot{width:130px}
  .iconbtn{background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px;border-radius:6px}
  .iconbtn:hover{color:var(--accent); background:var(--accent-soft)}
  .iconbtn.del:hover{color:var(--red); background:var(--red-bg)}

  /* status select */
  .st{border-radius:20px!important; font-weight:700; font-size:11.5px!important; text-align:center; border:1px solid transparent!important; cursor:pointer; padding:6px 8px!important; width:auto!important; min-width:108px}
  .st-confirmado{background:#d8f6e5!important; color:#0d7a40!important}
  .st-estimado{background:#dcebff!important; color:#1d5fb8!important}
  .st-pendiente{background:#ffdede!important; color:#c12727!important}
  .st-no_aplica{background:#e8e8ee!important; color:#6e6e7a!important}

  .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:20px;font-size:11.5px;font-weight:600}
  .badge.green{background:var(--green-bg);color:var(--green)}
  .badge.amber{background:var(--amber-bg);color:var(--amber)}
  .badge.red{background:var(--red-bg);color:var(--red)}
  .badge.gray{background:var(--gray-bg);color:var(--gray)}
  .badge.accent{background:var(--accent-soft);color:var(--accent)}

  .subtotbar{
    display:flex; align-items:center; justify-content:space-between; margin-top:12px; padding-top:12px;
    border-top:1px dashed var(--line); flex-wrap:wrap; gap:10px;
  }
  .subtotbar .lbl{color:var(--muted); font-size:12.5px}
  .subtotbar .val{font-size:18px; font-weight:800; color:var(--accent); font-variant-numeric:tabular-nums}

  /* barra total fija (no perderse nunca) */
  .totbar{
    position:fixed; bottom:0; left:236px; right:0; z-index:40;
    display:flex; align-items:center; gap:26px; padding:10px 28px;
    background:linear-gradient(180deg,#16161b,#101014); border-top:1px solid var(--line);
    font-size:12.5px; color:var(--muted);
  }
  .totbar b{color:var(--txt); font-variant-numeric:tabular-nums; font-size:14px; margin-left:6px}
  .totbar .gran b{color:var(--accent); font-size:16px}

  /* period tabs */
  .ptabs{display:flex; gap:8px; margin-bottom:18px}
  .modtab-row{display:flex; gap:6px; flex-wrap:wrap; margin-bottom:16px}
  .modtab{padding:8px 12px; border-radius:8px; background:var(--panel); border:1px solid var(--line); cursor:pointer; font-size:12.5px; color:var(--muted); display:flex; align-items:center; gap:7px}
  .modtab.active{background:var(--panel2); color:var(--txt); border-color:var(--accent)}
  .modtab .cnt{font-size:10px; background:var(--bg); padding:1px 6px; border-radius:10px; color:var(--muted)}
  .modtab .sb{font-size:10.5px; color:var(--accent); font-variant-numeric:tabular-nums}
  .modtab .mini{width:7px;height:7px;border-radius:50%}

  /* dashboard cards */
  .pcard{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:16px 18px;
    cursor:pointer; transition:.12s; position:relative; overflow:hidden;
  }
  .pcard:hover{border-color:var(--accent); transform:translateY(-2px)}
  .pcard::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--accent)}
  .pcard .code{color:var(--accent); font-weight:700; font-size:12px; letter-spacing:1px}
  .pcard .nm{font-size:16px; font-weight:700; margin:4px 0 2px}
  .pcard .cl{color:var(--muted); font-size:12.5px; margin-bottom:12px}
  .pcard .tot{font-size:20px; font-weight:800; color:var(--txt); font-variant-numeric:tabular-nums}
  .pcard .tot small{font-size:11px; color:var(--muted); font-weight:500; display:block}
  .pcard .foot{display:flex; align-items:center; justify-content:space-between; margin-top:12px}

  /* KPI strip */
  .kpis{display:grid; grid-template-columns:repeat(5,1fr); gap:12px; margin-bottom:20px}
  .kpi{background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:13px 15px}
  .kpi .k{color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.5px}
  .kpi .v{font-size:18px; font-weight:800; margin-top:5px; font-variant-numeric:tabular-nums}
  .kpi.hl{background:linear-gradient(135deg,#241b12,#15151a); border-color:var(--accent)}
  .kpi.hl .v{color:var(--accent)}

  /* waterfall resumen */
  .wf{width:100%; border-collapse:collapse}
  .wf td{padding:11px 6px; border-bottom:1px solid #1f1f25; font-size:14px}
  .wf td.r{text-align:right; font-variant-numeric:tabular-nums; font-weight:700}
  .wf tr.sum td{border-top:2px solid var(--line); font-weight:800}
  .wf tr.grand td{font-size:18px; color:var(--accent); border-top:2px solid var(--accent)}
  .wf .pct{color:var(--muted); font-weight:500; font-size:12px}
  .wf .plus{color:var(--green)}

  .slider-wrap{display:flex; align-items:center; gap:14px}
  input[type=range]{flex:1; accent-color:var(--accent); background:transparent; border:none; padding:0}
  .pctbox{width:90px; text-align:center}

  /* reports */
  .toggles{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:16px}
  .tg{display:flex; align-items:center; gap:8px; padding:8px 12px; background:var(--panel); border:1px solid var(--line); border-radius:8px; font-size:12.5px; cursor:pointer}
  .tg input{width:auto}
  .report{background:#fff; color:#1a1a1a; border-radius:10px; padding:0; overflow:hidden; box-shadow:var(--shadow)}
  .rep-pad{padding:38px 44px}
  .empty{text-align:center; padding:60px 20px; color:var(--muted)}
  .empty .big{font-size:46px; margin-bottom:10px}
  .hint{font-size:12px; color:var(--muted2); margin-top:4px}
  .note{background:var(--panel2); border-left:3px solid var(--accent); padding:10px 14px; border-radius:6px; font-size:12.5px; color:var(--muted); margin:12px 0}
  .flex-end{display:flex; justify-content:flex-end; gap:10px; margin-top:6px}

  /* ===== EDITOR PDF ===== */
  .ed-toolbar{
    display:flex; align-items:center; gap:12px; flex-wrap:wrap; margin-bottom:16px;
    background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:10px 14px;
  }
  .ed-toolbar .seg{display:inline-flex; border:1px solid var(--line); border-radius:8px; overflow:hidden}
  .ed-toolbar .seg button{padding:7px 14px; background:var(--panel2); border:none; color:var(--muted); cursor:pointer; font-size:12.5px; font-weight:600}
  .ed-toolbar .seg button.on{background:var(--accent); color:#000}
  .sheet-wrap{display:flex; justify-content:center; position:relative}
  .sheet{
    background:#fff; color:#1a1a1a; box-shadow:0 10px 40px rgba(0,0,0,.6);
    padding:14mm; position:relative; border-radius:2px;
  }
  .sheet.carta{width:215.9mm; min-height:279.4mm}
  .sheet.a4{width:210mm; min-height:297mm}
  .pg-guide{position:absolute; left:0; right:0; border-top:2px dashed #c9853f; opacity:.55; pointer-events:none; z-index:5}
  .pg-guide span{position:absolute; right:6px; top:-18px; font-size:10px; color:#c9853f; background:#fff; padding:1px 6px; border-radius:4px}
  /* campos editables dentro de la hoja (display:inline para que el texto
     quiebre igual que en el PDF exportado) */
  .sheet [data-bind]{outline:1.5px dashed transparent; border-radius:3px; transition:outline-color .12s; cursor:text; display:inline}
  .sheet [data-bind]:hover{outline-color:#e8a25e; background:#fff7ee}
  .sheet [data-bind]:focus{outline:2px solid #e8a25e; background:#fff7ee}
  .sheet [data-bind]:empty{display:inline-block; min-width:60px}
  .sheet [data-bind]:empty::before{content:attr(data-ph); color:#b8b8b8; font-style:italic; font-weight:400}
  .sheet .edval{cursor:pointer; outline:1.5px dashed transparent; border-radius:3px; padding:0 3px}
  .sheet .edval:hover{outline-color:#e8a25e; background:#fff7ee}
  .sheet input.valedit{
    width:120px; padding:2px 6px; font-size:12.5px; text-align:right; font-weight:700;
    border:2px solid #e8a25e; border-radius:4px; background:#fffdf8; color:#111;
  }
  .sheet .rowdig{
    border:none; background:transparent; cursor:pointer; font-size:11px; color:#c9853f;
    padding:0 4px; opacity:0; transition:.12s;
  }
  .sheet tr:hover .rowdig{opacity:1}
  .ed-help{color:var(--muted); font-size:12px; margin:10px 0 0; text-align:center}

  /* drawer detalle */
  .drawer{
    position:fixed; top:59px; right:0; bottom:0; width:520px; max-width:92vw; z-index:60;
    background:var(--panel); border-left:1px solid var(--line); box-shadow:-10px 0 40px rgba(0,0,0,.5);
    display:flex; flex-direction:column;
  }
  .drawer .dr-head{display:flex; align-items:center; justify-content:space-between; padding:14px 18px; border-bottom:1px solid var(--line)}
  .drawer .dr-head h3{margin:0; font-size:14px}
  .drawer .dr-body{flex:1; overflow-y:auto; padding:14px 18px}
  .drawer .dr-mod{margin-bottom:18px}
  .drawer .dr-mod h4{margin:0 0 8px; font-size:12.5px; color:var(--accent); letter-spacing:.4px}
  .dr-row{background:var(--panel2); border:1px solid var(--line); border-radius:8px; padding:10px 12px; margin-bottom:8px}
  .dr-row .dr-line1{display:flex; gap:8px; margin-bottom:8px; align-items:center}
  .dr-row .dr-line2{display:flex; gap:8px; flex-wrap:wrap; align-items:flex-end}
  .dr-row .mini-f{flex:1; min-width:90px}
  .dr-row .mini-f label{display:block; font-size:9.5px; color:var(--muted); text-transform:uppercase; letter-spacing:.4px; margin-bottom:3px}
  .dr-row input,.dr-row select{padding:6px 8px; font-size:13px}
  .dr-row .dr-tot{font-weight:800; color:var(--accent); white-space:nowrap; font-variant-numeric:tabular-nums; padding-bottom:7px}
  .drawer .dr-foot{padding:12px 18px; border-top:1px solid var(--line); display:flex; justify-content:space-between; align-items:center}

  /* ===== PRINT ===== */
  #printArea{display:none}
  @media print{
    body{background:#fff}
    .topbar,.side,.no-print,.totbar,.drawer{display:none!important}
    .main{padding:0;max-width:none}
    #printArea{display:block}
    .app-body{display:none}
  }
  /* report internals (idéntico a la versión 1 — NO cambiar: formato del PDF) */
  .doc{color:#1a1a1a; font-size:12.5px; background:#fff}
  .doc .head{display:flex; justify-content:space-between; align-items:flex-start; border-bottom:3px solid #111; padding-bottom:16px; margin-bottom:18px}
  .doc .logo{display:flex; align-items:center; gap:10px}
  .doc .doc-logo{height:34px;width:auto;display:block}
  .doc .logo-tag{font-size:9.5px;letter-spacing:2px;color:#777;align-self:flex-end;padding-bottom:5px}
  .doc .logo b{font-size:17px;letter-spacing:1px}
  .doc .logo small{display:block;color:#666;font-size:9.5px;letter-spacing:2px}
  .doc .meta{text-align:right; font-size:11.5px; color:#444}
  .doc .meta .cot{font-size:15px;font-weight:800;color:#111}
  .doc h2.dt{font-size:13px; background:#111; color:#fff; padding:7px 12px; border-radius:5px; margin:18px 0 10px; letter-spacing:.5px}
  .doc table{width:100%; border-collapse:collapse; margin:6px 0}
  .doc th{background:#f2f2f2; text-align:left; padding:8px 10px; font-size:10.5px; text-transform:uppercase; letter-spacing:.4px; border-bottom:2px solid #ddd}
  .doc td{padding:7px 10px; border-bottom:1px solid #eee; font-variant-numeric:tabular-nums}
  .doc td.r,.doc th.r{text-align:right}
  .doc .tot-row td{font-weight:800; background:#fafafa}
  .doc .grand-row td{font-weight:900; font-size:14px; background:#111; color:#fff}
  .doc .grand-row td .iva{font-weight:500;font-size:10px}
  .doc .twocol{display:flex; gap:30px; margin-top:18px}
  .doc .twocol > div{flex:1}
  .doc .lbl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:#888;margin-bottom:3px}
  .doc .box{border:1px solid #ddd;border-radius:6px;padding:12px 14px;font-size:11.5px}
  .doc .emer-box{border:2px dashed #999;background:#f5f5f5;padding:14px;border-radius:8px;margin-top:16px}
  .doc .foot{margin-top:26px;border-top:1px solid #ddd;padding-top:12px;font-size:10px;color:#888;text-align:center}
  .doc .st-tag{font-size:9px;padding:2px 6px;border-radius:10px;font-weight:700}
  .doc .stc{background:#e3f9ec;color:#178a4e}
  .doc .ste{background:#e7f0ff;color:#2563b0}
  .doc .stp{background:#ffe3e3;color:#cc2b2b}
  .doc .stn{background:#eee;color:#888}
  .doc .muted{color:#888}
  .doc .pos{color:#178a4e}
</style>
<style>
  /* ===== RESPONSIVE — iPad / Android / móvil ===== */
  @media (max-width:820px){
    .shell{flex-direction:column}
    .side{
      width:100%; position:static; height:auto; top:0;
      border-right:none; border-bottom:1px solid var(--line);
      display:flex; flex-wrap:nowrap; overflow-x:auto; gap:6px; padding:8px 10px;
      -webkit-overflow-scrolling:touch;
    }
    .side .grp{display:none}
    .side .navbtn{width:auto; white-space:nowrap; flex:0 0 auto; padding:11px 13px; margin:0}
    .side .navbtn .dot{margin-left:6px}
    .side > div:last-child{flex:0 0 auto; padding:0; display:flex; align-items:center}
    .side > div:last-child .btn{width:auto; white-space:nowrap}
    .main{padding:16px 14px 96px; max-width:none}
    .totbar{left:0; gap:16px; overflow-x:auto; white-space:nowrap; padding:10px 14px; -webkit-overflow-scrolling:touch}
    .grid2,.grid3{grid-template-columns:1fr}
    .kpis{grid-template-columns:1fr 1fr}
    .topbar{padding:10px 12px; gap:10px}
    .topbar .brand-sub{display:none}
    .proj-pill{max-width:210px}
    .proj-pill .code{display:none}
    .proj-pill select{max-width:170px}
    .drawer{width:100vw; max-width:100vw; top:0}
    .sheet-wrap{overflow-x:auto; justify-content:flex-start}
    /* 16px en campos = iOS no hace zoom al enfocar; objetivos táctiles más grandes */
    input[type=text],input[type=number],input[type=date],select,textarea{font-size:16px; padding:11px 12px}
    .btn{padding:11px 15px}
    .mod-table input,.mod-table select{font-size:15px; padding:9px}
    .st{min-width:120px}
    h1{font-size:19px}
  }
  @media (max-width:480px){
    .kpis{grid-template-columns:1fr}
    .modtab{font-size:12px; padding:9px 11px}
    .rep-pad{padding:18px 14px}
  }

<script>
/* ============================================================
   CotizaPro V2 · INNOVVA Industrials
   App de costeo de proyectos industriales — 100% offline.
   Novedades V2:
   - Módulo Contratistas (cuenta como mano de obra en el informe)
   - Campos de escritura blancos con letra negra (legibilidad)
   - Editor del PDF sobre la hoja (carta / A4) sincronizado con la cotización
   - Buscador, numeración y duplicado de ítems en las tablas
   - Redondeo consistente en el documento del cliente
   - Migración automática de datos desde la versión 1
   ============================================================ */

const STORE    = 'innovva_cotizapro_v2';
const STORE_V1 = 'innovva_cotizapro_v1';
const fmt  = n => '$' + Math.round(n||0).toLocaleString('es-CL');
const fmt0 = n => Math.round(n||0).toLocaleString('es-CL');
const fmtPct = n => { const v=Math.round((parseFloat(n)||0)*100)/100; return String(v); };
const num  = v => { const n = parseFloat(String(v).replace(/[^0-9.\-]/g,'')); return isNaN(n)?0:n; };
/* pesos chilenos: ignora puntos de miles, $ y espacios → entero */
const pnum = v => { const s=String(v==null?'':v).trim(); const neg=s.startsWith('-'); const d=s.replace(/[^0-9]/g,''); const n=d?parseInt(d,10):0; return neg?-n:n; };
const uid  = () => 'x'+Math.random().toString(36).slice(2,9);
const clone = o => JSON.parse(JSON.stringify(o));

/* ---------- Config global (tarifas base) ---------- */
const DEFAULT_CONFIG = {
  tarifa_t1_dia:45000, tarifa_t1_sab:56000,
  tarifa_t2_dia:45000, tarifa_t2_sab:56000,
  tarifa_sup_dia:80000,
  hotel_doble_noche:50000, hotel_simple_noche:37000,
  almuerzo_persona_dia:8000, cena_persona_dia:8000,
  costo_km:300, peaje_ida_vuelta:50000,
  costo_fijo_mensual:500000,
  contingencia_pct:10, utilidad_pct:25, iva_pct:19,
  validez:'Cotización válida por 15 días corridos.',
  forma_pago:'50% de anticipo contra orden de compra, 50% contra entrega del trabajo terminado.',
  exclusiones:'No incluye: andamios o estructuras de acceso, grúas, suministro de energía eléctrica/aire en faena, trabajos no descritos en el alcance, materiales distintos a los listados, ni permisos especiales del mandante.',
};

/* ---------- Definición de módulos ----------
   t: 'text' | 'num' (cantidades) | 'money' (pesos) | 'sel'
   scale: campos de precio que se reescalan al editar un valor en el PDF */
const MODULES = [
  { key:'personal', title:'Personal', icon:'👷',
    cols:[
      {f:'nombre', l:'Trabajador', t:'text', w:140},
      {f:'dias', l:'Días L-V', t:'num', w:75},
      {f:'dias_sabado', l:'Sábados', t:'num', w:75},
      {f:'tarifa_dia', l:'Costo empresa/día', t:'money', w:135},
      {f:'tarifa_sabado', l:'Costo sábado', t:'money', w:125},
    ],
    scale:['tarifa_dia','tarifa_sabado'],
    calc:r => num(r.dias)*num(r.tarifa_dia) + num(r.dias_sabado)*num(r.tarifa_sabado),
    nuevo:()=>({id:uid(),nombre:'Nuevo trabajador',dias:0,dias_sabado:0,tarifa_dia:0,tarifa_sabado:0,status:'pendiente',obs:''}) },

  { key:'contratistas', title:'Contratistas', icon:'🤝',
    cols:[

const ID_RE = /^x[a-z0-9]{5,9}$/; // formato de uid(); ids ajenos se regeneran (evita inyección por respaldo)

/* Garantiza estructura completa en proyectos (incluye respaldos V1 importados):
   módulo contratistas, condiciones por proyecto y opciones del documento. */
function normalizeDB(){
  if(!DB) return;
  DB.config = Object.assign(clone(DEFAULT_CONFIG), DB.config||{});
  if(!Array.isArray(DB.projects)) DB.projects = [];
  DB.projects = DB.projects.filter(p=>p && typeof p==='object'); // descarta entradas corruptas
  DB.projects.forEach(p=>{
    if(!ID_RE.test(String(p.id||''))) p.id=uid();
    if(!p.periodos || typeof p.periodos!=='object') p.periodos={};
    ['base','emergencia'].forEach(pk=>{
      if(!p.periodos[pk] || typeof p.periodos[pk]!=='object') p.periodos[pk]=emptyPeriod();
      MODULES.forEach(m=>{
        if(!Array.isArray(p.periodos[pk][m.key])) p.periodos[pk][m.key]=[];
        p.periodos[pk][m.key] = p.periodos[pk][m.key].filter(r=>r && typeof r==='object');
        p.periodos[pk][m.key].forEach(r=>{ if(!ID_RE.test(String(r.id||''))) r.id=uid(); });
      });
    });
    if(!p.informe || typeof p.informe!=='object') p.informe={mostrar_costos_fijos:false,mostrar_materiales_detalle:true,mostrar_emergencia:true,mostrar_contingencia:true};
    /* condiciones del documento POR PROYECTO (editables en el PDF sin tocar la config global) */
    p.cond = Object.assign({
      forma_pago: DB.config.forma_pago,
      validez: DB.config.validez,
      exclusiones: DB.config.exclusiones,
    }, (p.cond && typeof p.cond==='object') ? p.cond : {});
    p.doc = Object.assign({ formato:'carta', labels:{} }, (p.doc && typeof p.doc==='object') ? p.doc : {});
    if(!p.doc.labels || typeof p.doc.labels!=='object') p.doc.labels={};
  });
  if(typeof DB.counter!=='number') DB.counter = DB.projects.length;
  if(!DB.activeId || !DB.projects.some(p=>p.id===DB.activeId)) DB.activeId = DB.projects.length? DB.projects[0].id : null;
}
function active(){ return DB.projects.find(p=>p.id===DB.activeId) || DB.projects[0]; }

/* ============================================================
   Motor de cálculo
   ============================================================ */
function rowTotal(modKey,row){
  if(row.status==='no_aplica') return 0;
  return MOD[modKey].calc(row);
}
function modSubtotal(period,modKey){
  return (period[modKey]||[]).reduce((s,r)=>s+rowTotal(modKey,r),0);
}
function periodBreakdown(period){
  const cats={};
  let base=0;
  MODULES.forEach(m=>{ cats[m.key]=modSubtotal(period,m.key); base+=cats[m.key]; });
  return {cats, base};
}
function computeProject(proj){
  const cont = num(proj.contingencia_pct), util = num(proj.utilidad_pct), iva = num(proj.iva_pct);
  function full(period){
    const {cats,base} = periodBreakdown(period);
    const contMonto = base*cont/100;
    const protegido = base+contMonto;
    const utilMonto = protegido*util/100;
    const neto = protegido+utilMonto;
    const ivaMonto = neto*iva/100;
    const total = neto+ivaMonto;
    return {cats,base,contMonto,protegido,utilMonto,neto,ivaMonto,total};
  }
  const r = { base:full(proj.periodos.base) };
  if(proj.emergencia_activa) r.emergencia = full(proj.periodos.emergencia);
  return r;
}
function statusRollup(proj){
  const counts={confirmado:0,estimado:0,pendiente:0,no_aplica:0};
  const periods = proj.emergencia_activa ? ['base','emergencia'] : ['base'];
  periods.forEach(pk=> MODULES.forEach(m=> (proj.periodos[pk][m.key]||[]).forEach(r=>{ counts[r.status]=(counts[r.status]||0)+1; })));
  let worst='confirmado';
  if(counts.estimado>0) worst='estimado';
  if(counts.pendiente>0) worst='pendiente';
  return {counts,worst};
}
const STATUS_COLOR = {confirmado:'green',estimado:'amber',pendiente:'red',no_aplica:'gray'};
const STATUS_VAR   = {confirmado:'var(--green)',estimado:'var(--amber)',pendiente:'var(--red)',no_aplica:'var(--gray)'};

/* ---- Vista del cliente: grupos con utilidad, contingencia y REDONDEO EXACTO.
   Cada línea se redondea a pesos enteros y los totales se suman sobre los
   valores redondeados: el documento siempre cuadra al peso. ---- */
function groupsFor(p, period){
  const util=num(p.utilidad_pct), cont=num(p.contingencia_pct);
  const fUtil = 1+util/100;
  const {cats,base}=periodBreakdown(period);
  let rows=[]; let foldFijos=0; let foldMods=null;
  CLIENT_GROUPS.forEach(g=>{
    let cost=g.mods.reduce((s,mk)=>s+cats[mk],0);
    if(g.optional && !p.informe[g.optional]){ foldFijos+=cost; foldMods=g.mods; return; }
    if(cost===0) return; // los negativos (descuentos) se conservan: el PDF debe cuadrar con el resumen
    rows.push({k:g.k, l:groupLabel(p,g), val:cost*fUtil, mods:g.mods.slice()});
  });
  if(foldFijos>0){
    if(rows.length){ rows[0].val += foldFijos*fUtil; rows[0].mods = rows[0].mods.concat(foldMods); }
    else rows.push({k:'adm', l:'Administración del proyecto', val:foldFijos*fUtil, mods:foldMods.slice()});
  }
  let contLine=null;
  if(p.informe.mostrar_contingencia){
    contLine = Math.round(base*(cont/100)*fUtil);
  }else{
    const sum = rows.reduce((s,r)=>s+r.val,0);
    const factor = (base>0 && sum>0) ? (base*(cont/100)*fUtil)/sum : 0;
    rows.forEach(r=>r.val*=(1+factor));
  }
  rows.forEach(r=>r.val=Math.round(r.val));
  const neto = rows.reduce((s,r)=>s+r.val,0)+(contLine||0);
  return {rows,contLine,neto};
}

/* Totales tal como los ve el cliente en el documento (redondeados al peso).
   Se usan en TODA la app para mostrar Neto/Total c/IVA, de modo que la
   barra inferior, el dashboard y el resumen coincidan exactamente con el PDF. */
function docTotals(p){
  const iva=num(p.iva_pct);
  const mk=period=>{ const g=groupsFor(p,period); const ivaM=Math.round(g.neto*iva/100); return {neto:g.neto, iva:ivaM, total:g.neto+ivaM}; };
  const r={ base:mk(p.periodos.base) };
  if(p.emergencia_activa) r.emergencia=mk(p.periodos.emergencia);
  return r;
}

/* Captura el campo enfocado y los scrolls para restaurarlos tras re-renderizar:
   así se puede tabular entre celdas y la lista no salta arriba al editar. */
function captureFocus(){
  const el=document.activeElement;
  if(!el || !el.getAttribute) return null;
  const cell=el.getAttribute('data-cell');
  if(!cell) return null;
  let s=null,e=null;
  try{ s=el.selectionStart; e=el.selectionEnd; }catch(_){}
  return {cell, s, e};
}
function restoreFocus(f){
  if(!f) return;
  const el=document.querySelector('[data-cell="'+f.cell+'"]');
  if(el){ el.focus(); try{ if(f.s!=null && el.setSelectionRange) el.setSelectionRange(f.s,f.e); }catch(_){} }
}
function captureScrolls(){
  const m={ win:window.scrollY };
  document.querySelectorAll('[data-scrollkey]').forEach(el=>{ m['k_'+el.getAttribute('data-scrollkey')]=el.scrollTop; });
  return m;
}
function restoreScrolls(m){
  document.querySelectorAll('[data-scrollkey]').forEach(el=>{ const v=m['k_'+el.getAttribute('data-scrollkey')]; if(v!=null) el.scrollTop=v; });
}
function render(){
  const _focus=captureFocus();
  const _scroll=captureScrolls();
  renderPill();
  renderSidebar();
  renderTotbar();
  const v=UI.view;
  const el=document.getElementById('view');
  if(v==='dashboard') el.innerHTML=viewDashboard();
  else if(v==='general') el.innerHTML=viewGeneral();
  else if(v==='costos') el.innerHTML=viewCostos();
  else if(v==='resumen') el.innerHTML=viewResumen();
  else if(v==='emergencia') el.innerHTML=viewEmergencia();
  else if(v==='informe_cliente') el.innerHTML=viewInformeCliente();
  else if(v==='editor_pdf') el.innerHTML=viewEditorPDF();
  else if(v==='informe_interno') el.innerHTML=viewInformeInterno();
  else if(v==='config') el.innerHTML=viewConfig();
  else el.innerHTML=viewDashboard();
  if(v==='editor_pdf'){ wireEditor(); }
  renderDrawer();
  if(UI._last!==v){ window.scrollTo(0,0); UI._last=v; }
  else { restoreScrolls(_scroll); if(_scroll.win!=null) window.scrollTo(0,_scroll.win); }
  restoreFocus(_focus);
}

function renderTotbar(){

function cellInput(period,modKey,r,c){
  const dc=`${period}:${modKey}:${r.id}:${c.f}`;
  if(c.t==='sel'){
    return `<td><select data-cell="${dc}" onchange="rowUpd('${period}','${modKey}','${r.id}','${c.f}',this.value)">${c.opts.map(o=>`<option ${r[c.f]===o?'selected':''}>${o}</option>`).join('')}</select></td>`;
  }
  if(c.t==='num'){
    return `<td><input data-cell="${dc}" class="num" type="number" step="any" value="${num(r[c.f])}" onchange="rowUpd('${period}','${modKey}','${r.id}','${c.f}',this.value,'num')"></td>`;
  }
  if(c.t==='money'){
    return `<td><input data-cell="${dc}" class="money" type="text" inputmode="numeric" value="${fmt0(num(r[c.f]))}" onfocus="this.select()" onchange="rowUpd('${period}','${modKey}','${r.id}','${c.f}',this.value,'money')"></td>`;
  }
  return `<td><input data-cell="${dc}" type="text" value="${esc(r[c.f]||'')}" onchange="rowUpd('${period}','${modKey}','${r.id}','${c.f}',this.value)"></td>`;
}

function moduleTable(period,modKey){
  const m=MOD[modKey]; const p=active();
  const rows=p.periodos[period][modKey]||[];
  const head = `<th class="idx">#</th>` + m.cols.map(c=>`<th style="width:${c.w}px">${c.l}</th>`).join('')
    + `<th class="num w-tot">Total</th><th style="width:125px">Estado</th><th style="width:190px">Observación</th><th style="width:70px"></th>`;
  const skey=`${period}:${modKey}`;
  const q=(UI.search[skey]||'').trim().toLowerCase();
  let sub=0, visibles=0;
  const body = rows.map((r,i)=>{
    const tot=rowTotal(modKey,r); sub+=tot;
    const cells = m.cols.map(c=>cellInput(period,modKey,r,c)).join('');
    const stSel = `<select data-cell="${period}:${modKey}:${r.id}:status" class="st st-${r.status}" onchange="rowUpd('${period}','${modKey}','${r.id}','status',this.value)">
        ${['confirmado','estimado','pendiente','no_aplica'].map(s=>`<option value="${s}" ${r.status===s?'selected':''}>${s.replace('_',' ')}</option>`).join('')}</select>`;
    // índice de búsqueda: valores crudos + montos formateados (para buscar "1.500.000" tal como se ve)
    const fmtVals = m.cols.filter(c=>c.t==='money'||c.t==='num').map(c=>fmt0(num(r[c.f])));
    const searchTxt = m.cols.map(c=>String(r[c.f]==null?'':r[c.f])).concat(fmtVals,[r.obs||'']).join(' ').toLowerCase();
    const hidden = q && !searchTxt.includes(q);
    if(!hidden) visibles++;
    return `<tr data-search="${esc(searchTxt)}"${hidden?' style="display:none"':''}>
      <td class="idx">${i+1}</td>${cells}
      <td class="cell-total">${r.status==='no_aplica'?'<span style="color:var(--gray)">—</span>':fmt(tot)}</td>
      <td>${stSel}</td>
      <td><input data-cell="${period}:${modKey}:${r.id}:obs" type="text" value="${esc(r.obs||'')}" onchange="rowUpd('${period}','${modKey}','${r.id}','obs',this.value)" placeholder="—"></td>
      <td style="white-space:nowrap">
        <button class="iconbtn" title="Duplicar línea" onclick="rowDup('${period}','${modKey}','${r.id}')">⧉</button>
        <button class="iconbtn del" title="Eliminar" onclick="rowDel('${period}','${modKey}','${r.id}')">🗑</button>
      </td></tr>`;
  }).join('');

  const extra = modKey==='herramientas' ? `<div class="note">Representa el <b>riesgo de desgaste/reposición</b>, no el valor total de las herramientas.</div>`
    : modKey==='costos_fijos' ? `<div class="note">Costo fijo diario = costos mensuales Innovva ÷ 30. Se edita el total mensual en <a onclick="go('config')" style="cursor:pointer">Configuración global</a>.</div>`
    : modKey==='contratistas' ? `<div class="note">En el informe del cliente los contratistas se agrupan dentro de <b>"Mano de obra y gestión técnica"</b>. Usa el buscador si la lista crece.</div>`
    : '';

  const cntTxt = q ? `${visibles} de ${rows.length} ítem(s)` : `${rows.length} ítem(s)`;
  const searchBox = rows.length>5 ? `
    <div class="tbl-tools">
      <input class="search" data-skey="${skey}" type="text" placeholder="🔎 Buscar en ${m.title.toLowerCase()}…" value="${esc(UI.search[skey]||'')}" oninput="filterRows(this)">
      <span class="cnt-info" data-role="cnt">${cntTxt}</span>
    </div>` : '';

  return `<div class="card">
    <h3>${m.icon} ${m.title} <span class="badge accent">${rows.length} ítem(s)</span></h3>
    ${extra}
    ${searchBox}
    <div class="tbl-scroll" data-scrollkey="${skey}"><table class="mod-table">
      <thead><tr>${head}</tr></thead>
      <tbody>${body || `<tr><td colspan="${m.cols.length+5}" style="text-align:center;color:var(--muted);padding:18px">Sin ítems. Agrega el primero ↓</td></tr>`}</tbody>
    </table></div>
    <div class="subtotbar">
      <button class="btn sm" onclick="rowAdd('${period}','${modKey}')">+ Agregar línea</button>
      <div><span class="lbl">Subtotal ${m.title}: </span><span class="val">${fmt(sub)}</span></div>
    </div>
  </div>`;
}

/* Filtro de búsqueda sin re-render (no pierde el foco). Guarda el texto en
   UI.search para que el filtro sobreviva a cualquier re-render de la app. */
function filterRows(inp){
  const q = inp.value.trim().toLowerCase();
  const skey = inp.getAttribute('data-skey');
  if(skey) UI.search[skey]=q;
  const card = inp.closest('.card');
  const trs = card.querySelectorAll('tbody tr[data-search]');
  let visible=0;
  trs.forEach(tr=>{
    const show = !q || tr.dataset.search.includes(q);
    tr.style.display = show?'':'none';
    if(show) visible++;
  });
  const cnt = card.querySelector('[data-role=cnt]');
  if(cnt) cnt.textContent = q ? `${visible} de ${trs.length} ítem(s)` : `${trs.length} ítem(s)`;
}

function edSpan(p, bind, text, edit, ph){

  return `<span contenteditable="true" spellcheck="false" data-bind="${bind}" data-ph="${esc(ph||'')}">${esc(text==null?'':text)}</span>`;

function wireEditor(){
  const sheet=document.getElementById('sheet'); if(!sheet) return;

  /* commits de texto */
  sheet.addEventListener('focusout', e=>{
    const el=e.target.closest('[data-bind]'); if(!el) return;
    commitBind(el);
  });
  sheet.addEventListener('keydown', e=>{
    const ed=e.target.closest('[data-bind]');
    if(ed && e.key==='Enter' && !e.shiftKey){ e.preventDefault(); ed.blur(); }
    if(e.target.classList && e.target.classList.contains('valedit')){
      if(e.key==='Enter'){ e.preventDefault(); e.target.blur(); }
      if(e.key==='Escape'){ e.target.dataset.cancel='1'; e.target.blur(); }
    }
  });

  /* clic en valores → input numérico */
  sheet.addEventListener('click', e=>{
    const dig=e.target.closest('[data-dig]');
    if(dig){ openDrawer(dig.dataset.dig, dig.dataset.mods.split(',')); return; }
    const v=e.target.closest('.edval');
    if(v && !v.querySelector('input')) swapToInput(v);
  });

  layoutGuides();
}

/* Commit de un campo de texto editado en la hoja.
   NO re-renderiza (el texto ya está en el DOM y no afecta totales): así un
   clic en otro elemento no se "traga" por un re-render. Solo guarda si cambió,
   comparando normalizado para no aplanar saltos de línea en un blur sin edición. */
function commitBind(el){
  const bind=el.dataset.bind;
  const norm = s => String(s==null?'':s).replace(/\s+/g,' ').trim();
  const text = norm(el.innerText);
  const p=active();
  if(bind.startsWith('p.')){
    const f=bind.slice(2);
    if(norm(p[f])!==text){ p[f]=text; save(); }
  }else if(bind.startsWith('cond.')){
    const f=bind.slice(5);
    if(norm(p.cond[f])!==text){ p.cond[f]=text; save(); }
  }else if(bind.startsWith('label.')){
    const k=bind.slice(6);
    const def=(CLIENT_GROUPS.find(g=>g.k===k)||{}).l||'';
    // vacío o igual al texto por defecto → restaura el rótulo estándar
    if(!text || text===def){ if(p.doc.labels[k]!=null){ delete p.doc.labels[k]; save(); } }
    else if(p.doc.labels[k]!==text){ p.doc.labels[k]=text; save(); }
  }
}

function swapToInput(span){
  const g=span.dataset.g; const old=Number(span.dataset.v)||0;
  const mods=(span.dataset.mods||'').split(',').filter(Boolean);
  const inp=document.createElement('input');
  inp.className='valedit'; inp.type='text'; inp.inputMode='numeric';
  inp.value=fmt0(old);
  span.textContent=''; span.appendChild(inp);
  inp.focus(); inp.select();
  inp.addEventListener('blur', ()=>{
    if(inp.dataset.cancel){ refreshEditor(); return; }
    const nv=pnum(inp.value);
    if(nv===old){ refreshEditor(); return; }
    if(g.endsWith('__cont')){
      if(nv<0){ refreshEditor(); return; }
      commitContVal(g, nv);
    }else{
      if(nv<=0){ alert('Para dejar una línea en cero, edita o quita sus ítems con el botón 🔧 de la línea.'); refreshEditor(); return; }
      commitGroupVal(g, mods, nv, old);
    }
  });
}

/* Editar el valor de una línea del PDF → reescala proporcionalmente
   los precios de los ítems internos. El cálculo es lineal en los
   campos de precio, así que el resultado coincide con lo digitado
   (± redondeo a pesos). */
function commitGroupVal(g, mods, newVal, oldVal){
  const p=active();
  if(oldVal<=0){ alert('Esta línea vale $0: agrega o edita los ítems con el botón 🔧 de la línea.'); refreshEditor(); return; }
  const periodKey = g.startsWith('emer:') ? 'emergencia' : 'base';
  const factor = newVal/oldVal;
  pushUndo(`Línea ${g} → ${fmt(newVal)}`);
  mods.forEach(mk=>{
    const m=MOD[mk]; if(!m) return;
    (p.periodos[periodKey][mk]||[]).forEach(r=>{
      if(r.status==='no_aplica') return;
      (m.scale||[]).forEach(f=>{ r[f]=Math.round(num(r[f])*factor); });
      if(r.status==='confirmado') r.status='estimado'; // un precio reescalado deja de ser confirmado
    });
  });
  save(); refreshEditor();
}

/* Editar la línea de contingencia → recalcula el % */
function commitContVal(g, newVal){
  const p=active();
  const periodKey = g.startsWith('emer:') ? 'emergencia' : 'base';
  const {base}=periodBreakdown(p.periodos[periodKey]);
  const fUtil=1+num(p.utilidad_pct)/100;
  if(base<=0){ alert('El costo directo es $0: agrega ítems primero.'); refreshEditor(); return; }
  pushUndo('Contingencia → '+fmt(newVal));
  // % con precisión completa para que el monto digitado se conserve exacto al peso;
  // en pantalla se muestra redondeado con fmtPct.
  p.contingencia_pct = Math.max(0, newVal/(base*fUtil)*100);
  save(); refreshEditor();
}

function pushUndo(label){
  UNDO.push({label, snap:clone(active())});
  if(UNDO.length>15) UNDO.shift();
}
function undoLast(){
  const u=UNDO.pop(); if(!u) return;
  const i=DB.projects.findIndex(x=>x.id===u.snap.id);
  if(i>=0){ DB.projects[i]=u.snap; save(); }
  render();
}

function refreshEditor(){
  if(UI.view!=='editor_pdf'){ render(); return; }
  render(); // una sola fuente de datos: re-render completo del editor
}

/* Guías de fin de página (carta: 279,4 mm · A4: 297 mm · márgenes 14 mm) */
function layoutGuides(){
  const sheet=document.getElementById('sheet'); if(!sheet) return;
  const p=active();
  const probe=document.createElement('div');
  probe.style.cssText='width:100mm;height:0;position:absolute;visibility:hidden';
  sheet.appendChild(probe);
  const pxPerMm=probe.offsetWidth/100;
  probe.remove();
  const pageH=(p.doc.formato==='a4'?297:279.4);
  const contentH=(pageH-28)*pxPerMm; // 14 mm de margen arriba y abajo
  const pad=14*pxPerMm;
  const totalH=sheet.scrollHeight;
  let i=1;
  while(pad + i*contentH < totalH - 20){
    const guide=document.createElement('div');
    guide.className='pg-guide no-print';
    guide.style.top=(pad + i*contentH)+'px';
    guide.innerHTML=`<span>≈ fin página ${i}</span>`;
    sheet.appendChild(guide);
    i++;
    if(i>30) break;
  }
}

/* ---------- Drawer: ítems de una línea del PDF ---------- */
function openDrawer(g, mods){
  UI.drawer={g, mods};
  renderDrawer();
}
function closeDrawer(){ UI.drawer=null; renderDrawer(); }

function renderDrawer(){
  const host=document.getElementById('drawerHost');
  if(!UI.drawer || UI.view!=='editor_pdf'){ host.innerHTML=''; return; }
  const p=active();
  const periodKey = UI.drawer.g.startsWith('emer:') ? 'emergencia' : 'base';
  const blocks = UI.drawer.mods.map(mk=>{
    const m=MOD[mk]; if(!m) return '';
    const rows=p.periodos[periodKey][mk]||[];
    const items=rows.map(r=>{
      const tot=rowTotal(mk,r);
      const descCol=m.cols.find(c=>c.t==='text');
      const numFields=m.cols.filter(c=>c!==descCol);
      const dpref=`d:${periodKey}:${mk}:${r.id}:`;
      return `<div class="dr-row">
        <div class="dr-line1">
          ${descCol?`<input data-cell="${dpref}${descCol.f}" type="text" value="${esc(r[descCol.f]||'')}" onchange="rowUpd('${periodKey}','${mk}','${r.id}','${descCol.f}',this.value)" style="flex:1">`:''}
          <button class="iconbtn" title="Duplicar" onclick="rowDup('${periodKey}','${mk}','${r.id}')">⧉</button>
          <button class="iconbtn del" title="Eliminar" onclick="rowDel('${periodKey}','${mk}','${r.id}')">🗑</button>
        </div>
        <div class="dr-line2">
          ${numFields.map(c=>{
            if(c.t==='sel') return `<div class="mini-f"><label>${c.l}</label><select data-cell="${dpref}${c.f}" onchange="rowUpd('${periodKey}','${mk}','${r.id}','${c.f}',this.value)">${c.opts.map(o=>`<option ${r[c.f]===o?'selected':''}>${o}</option>`).join('')}</select></div>`;
            if(c.t==='money') return `<div class="mini-f"><label>${c.l}</label><input data-cell="${dpref}${c.f}" class="money" type="text" inputmode="numeric" value="${fmt0(num(r[c.f]))}" onfocus="this.select()" onchange="rowUpd('${periodKey}','${mk}','${r.id}','${c.f}',this.value,'money')"></div>`;
            if(c.t==='text') return `<div class="mini-f"><label>${c.l}</label><input data-cell="${dpref}${c.f}" type="text" value="${esc(r[c.f]||'')}" onchange="rowUpd('${periodKey}','${mk}','${r.id}','${c.f}',this.value)"></div>`;
            return `<div class="mini-f"><label>${c.l}</label><input data-cell="${dpref}${c.f}" class="num" type="number" step="any" value="${num(r[c.f])}" onchange="rowUpd('${periodKey}','${mk}','${r.id}','${c.f}',this.value,'num')"></div>`;
          }).join('')}
          <div class="dr-tot">${r.status==='no_aplica'?'—':fmt(tot)}</div>
        </div>
      </div>`;
    }).join('');
    const sub=modSubtotal(p.periodos[periodKey],mk);
    return `<div class="dr-mod">
      <h4>${m.icon} ${m.title} · <span style="color:var(--txt)">${fmt(sub)}</span></h4>
      ${items||'<div class="hint">Sin ítems.</div>'}
      <button class="btn sm" onclick="rowAdd('${periodKey}','${mk}')">+ Agregar a ${m.title}</button>
    </div>`;
  }).join('');
  host.innerHTML=`<div class="drawer no-print">
    <div class="dr-head">
      <h3>🔧 Ítems de la línea ${periodKey==='emergencia'?'(emergencia)':''}</h3>
      <button class="iconbtn" onclick="closeDrawer()" style="font-size:18px">✕</button>
    </div>
    <div class="dr-body" data-scrollkey="drawer">${blocks}</div>
    <div class="dr-foot">
      <span class="hint">Los cambios se reflejan al instante en la hoja y en toda la app.</span>
      <button class="btn primary sm" onclick="closeDrawer()">Listo</button>
    </div>
  </div>`;
}

function viewInformeInterno(){

  return `

    <div class="report rep-pad">${internoDocHTML(p)}</div>

/* ---------- Configuración global ---------- */
function viewConfig(){
  const cf=DB.config;
  const f=(key,label,hint='')=>`<div class="field"><label>${label}</label><input class="money" type="text" inputmode="numeric" value="${fmt0(num(cf[key]))}" onfocus="this.select()" onchange="cfgUpd('${key}',pnum(this.value))">${hint?`<div class="hint">${hint}</div>`:''}</div>`;
  const fp=(key,label,hint='')=>`<div class="field"><label>${label}</label><input type="number" step="any" value="${num(cf[key])}" onchange="cfgUpd('${key}',num(this.value))">${hint?`<div class="hint">${hint}</div>`:''}</div>`;
  return `
    <h1>Configuración global</h1>
    <p class="sub">Tarifas y textos por defecto. <b>No afecta proyectos ya creados</b>, solo los nuevos.</p>

    <div class="card"><h3>👷 Tarifas personal (costo empresa)</h3>
      <div class="grid2">
        ${f('tarifa_t1_dia','Trabajador 1 — día (L-V)')}${f('tarifa_t1_sab','Trabajador 1 — sábado')}
        ${f('tarifa_t2_dia','Trabajador 2 — día (L-V)')}${f('tarifa_t2_sab','Trabajador 2 — sábado')}
        ${f('tarifa_sup_dia','Supervisor — día en terreno','Costo trabajador, separado de la utilidad')}
      </div>
    </div>

    <div class="card"><h3>🏨 Estadía y alimentación</h3>
      <div class="grid3">
        ${f('hotel_doble_noche','Hotel doble / noche')}${f('hotel_simple_noche','Hotel simple / noche')}
        ${f('almuerzo_persona_dia','Almuerzo / persona')}${f('cena_persona_dia','Cena / persona')}
      </div>
    </div>

    <div class="card"><h3>🚚 Transporte y fijos</h3>
      <div class="grid3">
        ${f('costo_km','Costo por km','Incluye permiso, seguro, depreciación, mantención, diésel')}
        ${f('peaje_ida_vuelta','Peajes ida/vuelta')}
        ${f('costo_fijo_mensual','Costos fijos Innovva / mes',`Diario: ${fmt(num(cf.costo_fijo_mensual)/30)}`)}
      </div>
    </div>

    <div class="card"><h3>📈 Porcentajes por defecto</h3>
      <div class="grid3">
        ${fp('contingencia_pct','Contingencia % (default)')}
        ${fp('utilidad_pct','Utilidad % (default)')}
        ${fp('iva_pct','IVA %')}
      </div>
    </div>

    <div class="card"><h3>📄 Textos del informe cliente (por defecto para proyectos nuevos)</h3>
      <div class="field"><label>Forma de pago</label><textarea onchange="cfgUpd('forma_pago',this.value)">${esc(cf.forma_pago)}</textarea></div>
      <div class="field"><label>Validez de la oferta</label><textarea onchange="cfgUpd('validez',this.value)">${esc(cf.validez)}</textarea></div>
      <div class="field"><label>Exclusiones</label><textarea onchange="cfgUpd('exclusiones',this.value)">${esc(cf.exclusiones)}</textarea></div>
    </div>

    <div class="card" style="border-color:#4a1f1f">
      <h3>⚠ Datos</h3>
      <div class="row">
        <button class="btn" onclick="exportJSON()">⬇ Respaldar todo (JSON)</button>
        <button class="btn" onclick="document.getElementById('imp').click()">⬆ Restaurar respaldo</button>
        <input id="imp" type="file" accept=".json" style="display:none" onchange="importJSON(this.files[0])">
        <button class="btn danger" onclick="resetAll()">Borrar todo y recargar datos base</button>
      </div>
      <div class="hint" style="margin-top:8px">Acepta respaldos de la versión 1 y de la versión 2.</div>
    </div>
  `;
}
function cfgUpd(key,val){ DB.config[key]=val; save(); if(UI.view==='config') render(); }

/* ---------- Export / Import / Reset ---------- */
function exportJSON(){
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='cotizapro_v2_respaldo_'+today()+'.json'; a.click();
}
function importJSON(file){
  if(!file) return; const rd=new FileReader();
  rd.onload=e=>{
    const prev=DB; // se valida sobre una copia; si algo falla, no se pisa lo actual
    try{
      const d=JSON.parse(e.target.result);
      if(!d || !Array.isArray(d.projects) || !d.projects.length) throw new Error('estructura inválida (falta projects)');
      DB=d; normalizeDB();
      if(!DB.projects.length) throw new Error('no hay proyectos válidos en el archivo');
      UNDO=[]; UI.drawer=null; UI.search={};
      save(); UI.view='dashboard'; UI._last=null; render(); alert('Respaldo restaurado.');
    }catch(err){ DB=prev; alert('Archivo inválido: '+err.message); }
  };
  rd.readAsText(file);
}
function resetAll(){
  if(!confirm('Esto borra TODOS los proyectos de la V2 y recarga los datos base. (La versión 1 no se toca.) ¿Continuar?')) return;
  localStorage.removeItem(STORE);
  DB=freshDB(); MIGRATED=false; UNDO=[]; UI.drawer=null; UI.search={};
  normalizeDB(); save(); UI.view='dashboard'; UI._last=null; render();
}

/* ---------- PDF print ---------- */
function printDoc(tipo){
  const p=active();
  const size = p.doc.formato==='a4' ? 'A4' : 'letter';
  document.getElementById('pageStyle').textContent = `@page{size:${size};margin:14mm}`;
  document.getElementById('printArea').innerHTML = tipo==='cliente'? clienteDocHTML(p,false) : internoDocHTML(p);
  window.print();
}

/* ---------- util ---------- */
function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ============================================================
   CLAVE DE ACCESO (solo versión publicada en internet)
   ------------------------------------------------------------
   GATE_ON  : pon false para abrir sin clave (uso local).
   Clave por defecto: innovva2026  (no distingue mayúsculas).
   Para CAMBIAR la clave: pídela y te genero el nuevo GATE_HASH,
   o calcula cyrb53(nuevaClaveEnMinúsculas) y pégalo abajo.
   Nota honesta: es una barrera práctica para visitantes casuales,
   no cifrado. La protección real es que este archivo NO contiene
   datos comerciales reales (el seed es de ejemplo).
   ============================================================ */
const GATE_ON   = true;
const GATE_HASH = '1ripdqgihr0'; // = cyrb53('innovva2026')

function cyrb53(str, seed=0){
  let h1=0xdeadbeef^seed, h2=0x41c6ce57^seed;
  for(let i=0,ch;i<str.length;i++){
    ch=str.charCodeAt(i);
    h1=Math.imul(h1^ch,2654435761);
    h2=Math.imul(h2^ch,1597334677);
  }
  h1=Math.imul(h1^(h1>>>16),2246822507)^Math.imul(h2^(h2>>>13),3266489909);
  h2=Math.imul(h2^(h2>>>16),2246822507)^Math.imul(h1^(h1>>>13),3266489909);
  return (4294967296*(2097151&h2)+(h1>>>0)).toString(36);
}
function bootApp(){ load(); render(); }
function unlockGate(){
  try{ sessionStorage.setItem('cotizapro_web_ok','1'); }catch(_){}
  const g=document.getElementById('gate'); if(g) g.style.display='none';
  bootApp();
}
function tryGate(){
  const inp=document.getElementById('gatePin');
  const v=(inp.value||'').trim().toLowerCase();
  if(cyrb53(v)===GATE_HASH){ unlockGate(); return; }
  const g=document.getElementById('gate');
  const err=document.getElementById('gateErr');
  if(err) err.textContent='Clave incorrecta.';
  if(g){ g.classList.remove('shake'); void g.offsetWidth; g.classList.add('shake'); }
  inp.value=''; inp.focus();
}
(function initGate(){
  const g=document.getElementById('gate');
  let unlocked=false;
  try{ unlocked = sessionStorage.getItem('cotizapro_web_ok')==='1'; }catch(_){}
  if(!GATE_ON || unlocked){ if(g) g.style.display='none'; bootApp(); }
  else { if(g) g.style.display='flex'; const inp=document.getElementById('gatePin'); if(inp) inp.focus(); }
})();

/* Service worker: app instalable + funciona sin internet en iPad/Android.
   Funciona servido por http(s) (GitHub Pages y localhost); en file:// se omite. */
if('serviceWorker' in navigator && location.protocol!=='file:'){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
